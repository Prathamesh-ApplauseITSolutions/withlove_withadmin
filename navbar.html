<script>
    $(document).ready(function () {
        // Sticky Navbar on Scroll
        var navbar = $("#top_header");
        var sticky = navbar.offset().top;

        $(window).scroll(function () {
            if ($(window).scrollTop() > sticky) {
                navbar.addClass("fixed-top shadow-sm");
            } else {
                navbar.removeClass("fixed-top shadow-sm");
            }
        });

        // Mobile and tablet dropdown functionality
        function initMobileDropdown() {
            const isMobile = window.innerWidth <= 991;
            
            if (isMobile) {
                // Hide all dropdowns initially
                $('.dropdown-menu').hide().removeClass('show');
                
                // Main dropdown click events
                $('.nav-item.dropdown > .dropdown-toggle').off('click').on('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const $dropdown = $(this).parent();
                    const $menu = $dropdown.find('.dropdown-menu').first();
                    
                    // Close all other dropdowns
                    $('.nav-item.dropdown').not($dropdown).find('.dropdown-menu').hide().removeClass('show');
                    
                    // Toggle this dropdown
                    if ($menu.is(':visible')) {
                        $menu.hide().removeClass('show');
                    } else {
                        $menu.show().addClass('show');
                    }
                });
                
            } else {
                // Desktop - restore hover functionality
                initDesktopDropdown();
            }
        }
        
        // Desktop hover functionality
        function initDesktopDropdown() {
            // Show all dropdowns initially for desktop
            $('.dropdown-menu').hide().removeClass('show');
            
            // Desktop hover functionality
            $('.nav-item.dropdown').each(function() {
                const $dropdown = $(this);
                const $menu = $dropdown.find('.dropdown-menu').first();
                
                let hoverTimer;
                
                // Main dropdown hover
                $dropdown.on('mouseenter', function() {
                    clearTimeout(hoverTimer);
                    // Close all other dropdowns first
                    $('.dropdown-menu').not($menu).hide();
                    // Show this dropdown
                    $menu.stop(true, true).fadeIn(200);
                });
                
                $dropdown.on('mouseleave', function() {
                    clearTimeout(hoverTimer);
                    hoverTimer = setTimeout(function() {
                        if (!$dropdown.is(':hover') && !$menu.is(':hover')) {
                            $menu.stop(true, true).fadeOut(200);
                        }
                    }, 600);
                });
                
                // Keep menu open when hovering over it
                $menu.on('mouseenter', function() {
                    clearTimeout(hoverTimer);
                    $(this).stop(true, true).show();
                });
                
                $menu.on('mouseleave', function() {
                    clearTimeout(hoverTimer);
                    hoverTimer = setTimeout(function() {
                        if (!$dropdown.is(':hover') && !$menu.is(':hover')) {
                            $menu.stop(true, true).fadeOut(200);
                        }
                    }, 600);
                });
            });
        }
        
        // Initialize on load
        initMobileDropdown();
        
        // Re-initialize on window resize
        let resizeTimer;
        $(window).on('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                initMobileDropdown();
            }, 250);
        });

        // Close dropdowns when clicking outside
        $(document).on('click', function(e) {
            if (!$(e.target).closest('.dropdown').length) {
                $('.dropdown-menu').removeClass('show').hide();
            }
        });

        // Escape key to close dropdowns
        $(document).on('keydown', function(e) {
            if (e.key === 'Escape') {
                $('.dropdown-menu').removeClass('show');
            }
        });

    });
    // *******active menu script*********
 const path = window.location.pathname;
  const page = path.split("/").pop();

  // Select all nav links
  const navLinks = document.querySelectorAll('.navbar-nav a.nav-link');
  const dropdownItems = document.querySelectorAll('.dropdown-item');

  // Function to set active state for dropdown parent
  function setDropdownParentActive(dropdownItem) {
    const dropdownMenu = dropdownItem.closest('.dropdown-menu');
    if (dropdownMenu) {
      const dropdownToggle = dropdownMenu.previousElementSibling;
      if (dropdownToggle && dropdownToggle.classList.contains('dropdown-toggle')) {
        dropdownToggle.classList.add('active');
      }
    }
  }

  navLinks.forEach(link => {
    const href = link.getAttribute('href');
    // Check if link matches current page
    if (href === page || (href === "index.html" && page === "")) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });

  // Check dropdown items for active state
  dropdownItems.forEach(item => {
    const href = item.getAttribute('href');
    if (href === page || (href === "index.html" && page === "")) {
      item.classList.add('active');
      setDropdownParentActive(item);
    } else {
      item.classList.remove('active');
    }
  });
//   ******active menu script********
</script>
